{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio{% endblock title %}</title>

    {% comment %} CSS {% endcomment %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    {% comment %} Icons {% endcomment %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <link rel="icon" href="{% static 'favicon.png' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-lg fixed-top" style="background-color: rgb(3, 9, 27);">
        <div class="container-fluid px-3 px-lg-5">
            <a class="navbar-brand fw-bold" href="{% url 'home-view' %}">Nidhi </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse text-white" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto gap-lg-5 gap-2">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'home-view' %}"><i class="fa-solid fa-home"></i> Home </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'about-view' %}"><i class="fa-solid fa-user"></i> About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'projects-view' %}"><i class="fa-solid fa-folder"></i> Projects</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'contact-view' %}"><i class="fa-solid fa-phone"></i> Contact</a>
                    </li>
                    
                </ul>
            </div> 
        </div>
    </nav>

    <main class="container py-4"  style="margin-top:80px;">
        {% block content %}{% endblock content %}
    </main>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
